services:
  postgres:
    image: postgres:16-alpine
    container_name: release-tracker-postgres
    environment:
      POSTGRES_DB: release_tracker
      POSTGRES_USER: release_user
      POSTGRES_PASSWORD: release_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U release_user -d release_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
